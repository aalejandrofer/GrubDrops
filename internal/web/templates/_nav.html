{{define "nav"}}
<header class="top">
  <div class="topbar">
    <a class="brand" href="/" style="text-decoration: none; color: inherit;">
      <span class="mark">GRUB<span>·</span>DROPS</span>
    </a>
    {{if .AuthedAdmin}}
    <nav class="nav">
      <a href="/" class="{{if eq .Active "dashboard"}}active{{end}}">Console</a>
      <a href="/drops" class="{{if eq .Active "drops"}}active{{end}}">Drops</a>
      <a href="/history" class="{{if eq .Active "history"}}active{{end}}">History</a>
      <a href="/settings" class="{{if or (eq .Active "settings") (eq .Active "accounts")}}active{{end}}">Settings</a>
    </nav>
    <div class="user">
      <span class="clock">— UTC</span>
      <span class="pulse" title="live"></span>
      <form method="post" action="/logout" style="display:inline">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <button type="submit" class="btn sm ghost" style="margin-left:6px">Logout</button>
      </form>
    </div>
    {{else}}
    <nav class="nav"></nav>
    <div class="user"><span class="clock">— UTC</span></div>
    {{end}}
  </div>
</header>
{{end}}
