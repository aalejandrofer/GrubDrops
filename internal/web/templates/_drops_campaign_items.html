{{define "drops_campaign_items"}}
{{if .Benefits}}
{{/* Items table only — meta info (ends/open) goes inline in the summary row. */}}
<table class="tbl items" style="margin:6px 18px 10px;">
  <thead><tr><th>Item</th><th>Required</th></tr></thead>
  <tbody>
    {{range .Benefits}}
    <tr>
      <td class="name">{{if .ImageURL}}<img src="{{.ImageURL}}" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:8px;object-fit:contain;">{{end}}{{.Name}}</td>
      <td class="handle">{{.RequiredMinutes}}m</td>
    </tr>
    {{end}}
  </tbody>
</table>
{{else}}
<div class="ev-detail" style="color:var(--muted);font-size:11px;">No items recorded for this campaign yet.</div>
{{end}}
{{end}}
