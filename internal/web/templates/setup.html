{{define "setup.html"}}{{template "layout" .}}{{end}}

{{define "title"}}Setup · rust-drops-miner{{end}}

{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="kicker">// first-run setup</div>
    <h1>Create admin password</h1>
    <p class="intro">This is the only credential to control the miner.</p>
    {{if .Flash}}<div class="err">{{.Flash}}</div>{{end}}
    <form method="post" action="/setup">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label>Password<input type="password" name="password" minlength="8" required autofocus></label>
      <label>Confirm<input type="password" name="confirm" minlength="8" required></label>
      <div class="submit-row">
        <span class="alt">min 8 chars</span>
        <button class="btn primary" type="submit">Create admin →</button>
      </div>
    </form>
  </div>
</div>
{{end}}
