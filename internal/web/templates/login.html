{{define "login.html"}}{{template "layout" .}}{{end}}

{{define "title"}}Login · GrubDrops{{end}}

{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card auth-centered">
    <div class="kicker">// login</div>
    <h1>GrubDrops</h1>
    {{if .Flash}}<div class="err">{{.Flash}}</div>{{end}}

    {{if .OIDCEnabled}}
    <a class="btn-sso" href="/auth/oidc/login">→ Continue with SSO</a>
    <div class="sso-divider"><span>or</span></div>
    {{end}}

    <form method="post" action="/login" class="auth-secondary">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label for="pw">Admin password</label>
      <div class="login-row">
        <input id="pw" type="password" name="password" required {{if not .OIDCEnabled}}autofocus{{end}}>
        <button class="btn-arrow" type="submit" aria-label="Log in">→</button>
      </div>
    </form>
  </div>
</div>
{{end}}
