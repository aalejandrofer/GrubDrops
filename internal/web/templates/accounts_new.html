{{define "accounts_new.html"}}{{template "layout" .}}{{end}}

{{define "title"}}New account · GrubDrops{{end}}

{{define "content"}}
<div class="shell">
  <div class="ph">
    <div>
      <div class="kicker">// accounts / new</div>
      <h1>New account</h1>
    </div>
  </div>

  {{if .Flash}}<div class="flash-ok" style="color:var(--red);border-left-color:var(--red);background:rgba(198,74,60,.06);">{{.Flash}}</div>{{end}}

  <div class="form-card">
    <form method="post" action="/accounts/new">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label>Platform
        <select name="platform">
          <option value="twitch">Twitch (drops)</option>
          <option value="kick">Kick (drops)</option>
        </select>
      </label>
      <label>Display name
        <input type="text" name="display_name" required placeholder="e.g. TTik3r">
        <span class="field-hint">A friendly label shown across the GrubDrops UI. For Twitch the real account is whoever approves the device code on the next screen — no username needed here.</span>
      </label>
      <div class="row">
        <a class="back-link" href="/accounts">← back</a>
        <button class="btn primary" type="submit">Create →</button>
      </div>
    </form>
  </div>
</div>
{{end}}
