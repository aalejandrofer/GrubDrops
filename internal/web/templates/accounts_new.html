{{define "accounts_new.html"}}{{template "layout" .}}{{end}}

{{define "title"}}{{t "new_account.title"}}{{end}}

{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="kicker">{{t "new_account.heading"}}</div>
    <h1>{{t "new_account.h1"}}</h1>

    {{if .Flash}}<div class="err">{{t .Flash}}</div>{{end}}

    <form method="post" action="/accounts/new">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label>{{t "new_account.platform"}}
        <select name="platform">
          <option value="twitch">{{t "new_account.twitch"}}</option>
          <option value="kick">{{t "new_account.kick"}}</option>
        </select>
      </label>
      <label>{{t "new_account.display_name"}}
        <input type="text" name="display_name" required placeholder="{{t "new_account.display_name_placeholder"}}">
      </label>
      <p class="intro" style="font-size:13px;margin:-8px 0 0;">{{t "new_account.display_name_desc"}}</p>
      <div class="submit-row">
        <a class="alt" href="/accounts">← {{t "new_account.back"}}</a>
        <button class="btn primary" type="submit">{{t "new_account.create"}} →</button>
      </div>
    </form>
  </div>
</div>
{{end}}
