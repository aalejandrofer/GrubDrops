{{define "drops.html"}}{{template "layout" .}}{{end}}

{{define "title"}}Drops · dropsminer{{end}}

{{define "content"}}
<div class="shell">
  {{with .Page}}
  <div class="ph">
    <div>
      <div class="kicker">// drops</div>
      <h1>Drops</h1>
    </div>
    <div class="actions">
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.14em;">filtered by whitelist</span>
    </div>
  </div>

  <div class="drops-tabs" role="tablist">
    <a role="tab"
       class="drops-tab {{if eq .Tab "past"}}on{{end}}"
       hx-get="/drops?tab=past"
       hx-target="#drops-tabpanel"
       hx-swap="outerHTML"
       hx-push-url="true"
       href="/drops?tab=past">
      Past <span class="count">{{.PastCount}}</span>
    </a>
    <a role="tab"
       class="drops-tab {{if eq .Tab "current"}}on{{end}}"
       hx-get="/drops?tab=current"
       hx-target="#drops-tabpanel"
       hx-swap="outerHTML"
       hx-push-url="true"
       href="/drops?tab=current">
      Current <span class="count">{{.CurrentCount}}</span>
    </a>
    <a role="tab"
       class="drops-tab {{if eq .Tab "upcoming"}}on{{end}}"
       hx-get="/drops?tab=upcoming"
       hx-target="#drops-tabpanel"
       hx-swap="outerHTML"
       hx-push-url="true"
       href="/drops?tab=upcoming">
      Upcoming <span class="count">{{.UpcomingCount}}</span>
    </a>
  </div>

  {{template "drops_table" .}}
  {{end}}
</div>

<script>
(function() {
  // HTMX only swaps the table; the tab strip stays static, so the
  // .on class never moves. Toggle it client-side on click.
  document.querySelectorAll('.drops-tabs .drops-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.drops-tabs .drops-tab').forEach(function(t) {
        t.classList.remove('on');
      });
      tab.classList.add('on');
    });
  });
})();
</script>
{{end}}
