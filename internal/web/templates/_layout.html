{{define "layout"}}<!doctype html>
<html lang="{{.Lang}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{block "title" .}}GrubDrops{{end}}</title>
<script>
  // Set the saved theme on <html> BEFORE the stylesheet paints, so there's no
  // flash of the wrong theme (FOUC). Defaults to dark (the original look).
  (function () {
    try {
      var t = localStorage.getItem('theme');
      document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
    } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>
<link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
<link rel="manifest" href="/static/site.webmanifest">
<meta name="theme-color" content="#a020f0">
<meta property="og:type" content="website">
<meta property="og:title" content="GrubDrops">
<meta property="og:image" content="/static/img/og-image.png">
<meta name="twitter:card" content="summary">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/app.css">
<script src="https://unpkg.com/htmx.org@2.0.2" defer></script>
</head>
<body>
{{if .AuthedAdmin}}{{template "nav" .}}{{end}}
<main>
{{block "content" .}}{{end}}
</main>
<script>
  // Clock: show browser-local time instead of UTC.
  (function () {
    function tick() {
      var el = document.querySelector('.clock');
      if (!el) return;
      el.textContent = new Date().toLocaleTimeString();
    }
    tick(); setInterval(tick, 1000);
  })();
  // Convert any element with data-ts attribute from ISO 8601 to local time.
  function convertTimestamps(root) {
    (root || document).querySelectorAll('[data-ts]').forEach(function(el) {
      var ts = el.getAttribute('data-ts');
      if (ts) {
        var d = new Date(ts);
        if (!isNaN(d)) el.textContent = d.toLocaleString();
      }
    });
  }
  convertTimestamps(document);
  // Re-convert after HTMX swaps.
  document.body.addEventListener('htmx:afterSwap', function(e) {
    convertTimestamps(e.target || document);
  });
</script>
<script>
  // Theme toggle: flip data-theme on <html>, persist to localStorage, update the
  // button glyph. The pre-paint head script applies the saved value on load.
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    function glyph() {
      return document.documentElement.getAttribute('data-theme') === 'light' ? '☾' : '☀';
    }
    btn.textContent = glyph();
    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
      btn.textContent = glyph();
    });
  })();
</script>
<script>
  // Custom language dropdown.
  (function () {
    var dd = document.getElementById('lang-dd');
    if (!dd) return;
    var btn = document.getElementById('lang-dd-btn');
    var menu = document.getElementById('lang-dd-menu');
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      var open = menu.hidden;
      menu.hidden = !open;
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    menu.addEventListener('click', function (e) {
      var li = e.target.closest('li[data-lang]');
      if (!li) return;
      var lang = li.getAttribute('data-lang');
      // POST to /api/lang via a hidden form.
      var f = document.createElement('form');
      f.method = 'POST'; f.action = '/api/lang'; f.style.display = 'none';
      var i = document.createElement('input');
      i.name = 'lang'; i.value = lang; f.appendChild(i);
      document.body.appendChild(f); f.submit();
    });
    document.addEventListener('click', function () {
      menu.hidden = true;
      btn.setAttribute('aria-expanded', 'false');
    });
  })();
</script>
</body>
</html>
{{end}}
