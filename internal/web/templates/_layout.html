{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{block "title" .}}GrubDrops{{end}}</title>
<script>
  // Set the saved theme on <html> BEFORE the stylesheet paints, so there's no
  // flash of the wrong theme (FOUC). Defaults to dark (the original look).
  (function () {
    try {
      var t = localStorage.getItem('theme');
      document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
    } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>
<link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
<link rel="manifest" href="/static/site.webmanifest">
<meta name="theme-color" content="#a020f0">
<meta property="og:type" content="website">
<meta property="og:title" content="GrubDrops">
<meta property="og:image" content="/static/img/og-image.png">
<meta name="twitter:card" content="summary">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/app.css">
<script src="https://unpkg.com/htmx.org@2.0.2" defer></script>
</head>
<body>
{{if .AuthedAdmin}}{{template "nav" .}}{{end}}
<main>
{{block "content" .}}{{end}}
</main>
<script>
  (function () {
    function tick() {
      const el = document.querySelector('.clock');
      if (!el) return;
      const n = new Date();
      const pad = (x) => String(x).padStart(2,'0');
      el.textContent = pad(n.getUTCHours()) + ':' + pad(n.getUTCMinutes()) + ':' + pad(n.getUTCSeconds()) + ' UTC';
    }
    tick(); setInterval(tick, 1000);
  })();
</script>
<script>
  // Theme toggle: flip data-theme on <html>, persist to localStorage, update the
  // button glyph. The pre-paint head script applies the saved value on load.
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    function glyph() {
      return document.documentElement.getAttribute('data-theme') === 'light' ? '☾' : '☀';
    }
    btn.textContent = glyph();
    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
      btn.textContent = glyph();
    });
  })();
</script>
</body>
</html>
{{end}}
