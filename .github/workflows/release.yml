name: Release images

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

# Build each image on a NATIVE runner per arch (amd64 on ubuntu-latest, arm64 on
# ubuntu-24.04-arm) instead of emulating arm64 via QEMU. The browser sidecar's
# apt/chromium install was the slow part under emulation; native runners cut it
# dramatically. The four (image x arch) builds run in parallel and push by digest;
# a merge job then stitches each image's manifest list with the version + latest
# tags. (Native arm64 runners are free for public repos.)
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # `key` (miner/browser) names the digest artifacts. It must NOT be a
        # prefix of another key — "grubdrops" is a prefix of "grubdrops-browser",
        # so using the image name would make the merge's `digest-grubdrops-*`
        # pattern also match the browser artifacts.
        include:
          - { image: grubdrops,         key: miner,   dockerfile: deploy/Dockerfile.miner,   platform: linux/amd64, runner: ubuntu-latest,   arch: amd64 }
          - { image: grubdrops,         key: miner,   dockerfile: deploy/Dockerfile.miner,   platform: linux/arm64, runner: ubuntu-24.04-arm, arch: arm64 }
          - { image: grubdrops-browser, key: browser, dockerfile: deploy/Dockerfile.browser, platform: linux/amd64, runner: ubuntu-latest,   arch: amd64 }
          - { image: grubdrops-browser, key: browser, dockerfile: deploy/Dockerfile.browser, platform: linux/arm64, runner: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          # Harmless for the browser image (no ARG VERSION); the miner reads it
          # via -ldflags so Settings shows the running tag.
          build-args: |
            VERSION=${{ github.ref_name }}
          outputs: type=image,name=ghcr.io/aalejandrofer/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          # Cache scoped per image+arch so an amd64 change doesn't bust the arm64
          # cache (and vice-versa).
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.key }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: grubdrops,         key: miner }
          - { image: grubdrops-browser, key: browser }
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.key }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/aalejandrofer/${{ matrix.image }}:${{ github.ref_name }} \
            -t ghcr.io/aalejandrofer/${{ matrix.image }}:latest \
            $(printf 'ghcr.io/aalejandrofer/${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ghcr.io/aalejandrofer/${{ matrix.image }}:${{ github.ref_name }}
