name: Release images

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push miner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.miner
          # Inject the release tag so Settings shows the running version
          # (auto-tracks every tag instead of a hand-maintained GRUB_VERSION env).
          build-args: |
            VERSION=${{ github.ref_name }}
          # Multi-arch: the miner is pure-Go (CGO_ENABLED=0, modernc.org/sqlite)
          # on distroless static, so buildx cross-compiles arm64 from the
          # platform tag with no toolchain changes. arm64 lets Raspberry Pi /
          # ARM self-hosters pull a prebuilt image instead of building from source.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/aalejandrofer/grubdrops:${{ github.ref_name }}
            ghcr.io/aalejandrofer/grubdrops:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push browser sidecar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.browser
          # Multi-arch. The Dockerfile branches on TARGETARCH: amd64 installs
          # google-chrome-stable (the verified-in-prod path; Google ships no
          # arm64 Linux Chrome), arm64 installs Debian's `chromium`, which is
          # built against system FFmpeg and DOES carry the H.264/AAC decoders
          # needed for Kick's IVS HLS stream (headless-shell lacks them). The
          # arm64 sidecar is user-confirmed working but resource heavy
          # (~4 GB RAM per live sidecar), so small ARM boxes run few in parallel.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/aalejandrofer/grubdrops-browser:${{ github.ref_name }}
            ghcr.io/aalejandrofer/grubdrops-browser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
